<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Augmentix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #080a0f;
      color: #e8eaf0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Aurora glow */
    .aurora {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .aurora-blob {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      background: radial-gradient(circle, rgba(99, 102, 241, 0.45) 0%, transparent 70%);
      filter: blur(90px);
      animation: auroraBreath 8s ease-in-out infinite;
    }

    @keyframes auroraBreath {
      0%   { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50%  { opacity: 0.9; transform: translate(-50%, -52%) scale(1.08); }
      100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
    }

    .logo {
      width: clamp(280px, 55vw, 700px);
      height: auto;
      display: block;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(165, 180, 252, 0.4);
      margin: 2rem auto;
    }

    .tagline {
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: rgba(232, 234, 240, 0.65);
      margin-top: 0.75rem;
    }

    .coming-soon {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(232, 234, 240, 0.45);
    }

    /* Grain overlay for texture */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* Fade-in animation */
    .content {
      text-align: center;
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="aurora">
    <div class="aurora-blob"></div>
  </div>
  <div class="grain"></div>
  <main class="content">
    <h1><img src="AUGMENTIX white  transap.png" alt="Augmentix" class="logo" /></h1>
    <p class="tagline">Intelligence, built in.</p>
    <div class="divider" style="margin-top: 2rem;"></div>
    <p class="coming-soon">Coming Soon</p>
  </main>
  <script>
    function alignBlob() {
      const logo = document.querySelector('.logo');
      const blob = document.querySelector('.aurora-blob');
      const rect = logo.getBoundingClientRect();
      const logoCenter = rect.top + rect.height * 0.35;
      const pct = (logoCenter / window.innerHeight) * 100;
      blob.style.top = pct + '%';
    }
    window.addEventListener('load', alignBlob);
    window.addEventListener('resize', alignBlob);
  </script>
</body>
</html>
